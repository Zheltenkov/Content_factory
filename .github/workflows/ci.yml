name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: python -m pip install -e ".[dev]"

      - name: Enforce line budgets
        run: python scripts/ci/check_line_budget.py

      - name: Enforce grep gates
        run: python scripts/ci/check_grep_gates.py

      - name: Detect duplicate functions
        run: python scripts/ci/check_duplicates.py

      - name: Run tests
        run: pytest

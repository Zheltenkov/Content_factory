id: branch_structure
title: Логическая структура ветки
source: "Регламент 3.2.1"
hooks:
  - at: pre.stage
    stages: [curriculum.planner]
requires: [curriculum.projects]
produces: [curriculum.branch_order, curriculum.branch_structure]

id: program_types
title: program_types (детское)
source: "Регламент 3.1.3"
hooks:
  - at: prompt.augment
    stages: [generator.intro]
  - at: post.validate
    stages: [generator.evaluation]
severity: soft
applies_to: {artifact_family: [lesson]}
params:
  kind: main
  allowed: [main, intensive, master_class]
  content_models: {main: lesson_course, intensive: lesson_course, master_class: lesson_single}
  master_markers: [мастер-класс, кейс, практическая задача]
  course_markers: [перечень учебных проектов, перечень занятий, программа]
instructions: instructions.md
check: check.py

version: 1

methodology:
  practice_tasks_range: [2, 8]
  practice_tasks_recommend: [2, 5]

structural:
  annotation_chars: [220, 800]
  intro_words: [70, 180]
  instruction_words: [80, 250]
  theory_parts: [3, 7]
  theory_words_per_part: [110, 260]
  readability_band: [45, 80]
  repetition_ratio_max: 0.06
  near_dup_max: 4
  diagram_topic_min: 0.15
  preflight:
    toc_min_lines: 3
    chapter_min_chars: 50

checker:
  didactic:
    generator_model: <GENERATOR_MODEL>
    jury_models:
      - anthropic/<JURY_MODEL_CLAUDE>
      - openai/<JURY_MODEL_GPT>
      - google/<JURY_MODEL_GEMINI>
    debate_roles:
      critic: deepseek/<DEBATE_CRITIC>
      defender: qwen/<DEBATE_DEFENDER>
      judge: google/<DEBATE_JUDGE>
    abstain_confidence: 0.55
    didactic_floor: 3.0
    debate_on_escalate: true
    debate_rounds: 1
    max_doc_chars: 11000

skills:
  voice:
    max_bureaucratic_hits: 1
    bureaucratic_terms:
      - в рамках
      - данный
      - настоящим
      - осуществляется
      - осуществить
      - производится
      - посредством
      - с целью
      - в целях
      - следует отметить
      - имеет место
    placeholder_terms:
      - todo
      - tbd
      - lorem ipsum
      - здесь будет
      - вставьте
      - заполнить
    placeholder_patterns:
      - "\\{\\{[^}]+\\}\\}"
      - "<[^>]*(todo|tbd|placeholder|заполнить)[^>]*>"
  content_sufficiency:
    theory_parts_range: [3, 7]
    theory_words_per_part: [110, 260]
    theory_words_overflow_factor: 1.2
    practice_tasks_range: [2, 8]
    approach_words_max: 150
    approach_bullets_range: [2, 6]
    p2p_criteria_min: 3
    p2p_observable_min: 2
    min_text_chars: 10
    min_situation_chars: 25
    observable_markers:
      - содержит
      - указан
      - указаны
      - есть
      - присутствует
      - нет
      - совпадает
      - заполнен
      - размещен
      - размещён
      - путь
      - файл
      - раздел
      - схема
      - таблица
      - минимум
  visual_quality:
    min_resolution: [1200, 800]
    min_long_side: 1000
    min_dpi: 96
    max_file_kb: 1024
    optimal_file_kb: 500
    bytes_per_kb: 1024
    formats: [png, jpg, jpeg, svg]
    formats_conditional: [gif, webp]
  competency_weights:
    weight_total: 100

enhancement:
  default:
    formulas: {min: 0, max: 6}
    tables: {min: 0, max: 2}
    diagrams: {min: 0, max: 3}
    code_examples: {min: 0, max: 3}
  no_code:
    formulas: {min: 0, max: 0}
    tables: {min: 1, max: 3}
    diagrams: {min: 0, max: 2}
    code_examples: {min: 0, max: 0}
  low_code:
    formulas: {min: 0, max: 2}
    tables: {min: 1, max: 3}
    diagrams: {min: 0, max: 3}
    code_examples: {min: 0, max: 2}
  hard_code:
    formulas: {min: 1, max: 4}
    tables: {min: 0, max: 2}
    diagrams: {min: 1, max: 3}
    code_examples: {min: 1, max: 5}

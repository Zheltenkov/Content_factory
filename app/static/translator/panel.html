<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Переводчик · Content Factory</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="workbench translator-panel" data-module="translator">
      <header class="workbench-header">
        <a class="back-link" href="/">Content Factory</a>
        <h1>Переводчик</h1>
        <nav class="toolbar" aria-label="Связанные модули">
          <a class="btn" href="/static/generator/panel.html">Генератор</a>
          <a class="btn" href="/static/checker/panel.html">Проверка</a>
        </nav>
      </header>

      <section class="tool-grid">
        <form class="editor-panel" id="translatorDocumentForm">
          <h2>Документ</h2>
          <label>Текст README или документа</label>
          <textarea id="translatorMarkdown" rows="14" placeholder="# Проект&#10;&#10;Описание на русском языке"></textarea>
          <label>Файл</label>
          <input id="translatorDocumentFile" type="file" accept=".md,.markdown,.txt,.html,.htm,.docx,.pdf" />
          <div class="toolbar">
            <select id="translatorLanguage">
              <option value="en">EN · Английский</option>
              <option value="kg">KG · Кыргызский</option>
              <option value="uz">UZ · Узбекский</option>
              <option value="tg">TG · Таджикский</option>
              <option value="ru">RU · Русский</option>
            </select>
            <select id="translatorMode">
              <option value="literal">Дословный</option>
              <option value="combined">Дословный + читаемость</option>
            </select>
            <input id="translatorProvider" type="text" placeholder="LLM provider" />
            <button type="submit">Перевести</button>
          </div>
        </form>

        <section class="editor-panel">
          <h2>Видео / субтитры</h2>
          <form id="translatorVideoForm">
            <label>Видео, SRT/VTT/JSON или transcript</label>
            <input id="translatorVideoFile" type="file" accept=".mp4,.webm,.mov,.avi,.mkv,.m4v,.srt,.vtt,.json,.txt" />
            <label>Transcript override</label>
            <textarea id="translatorTranscript" rows="8" placeholder="00:00:00,000 --> 00:00:04,000&#10;Привет, это вводный модуль"></textarea>
            <div class="toolbar">
              <select id="translatorVideoLanguage">
                <option value="en">EN</option>
                <option value="kg">KG</option>
                <option value="uz">UZ</option>
                <option value="tg">TG</option>
              </select>
              <select id="translatorOutputMode">
                <option value="subtitles_only">Субтитры</option>
                <option value="both">Субтитры + video adapter</option>
                <option value="burned_video">Только video adapter</option>
              </select>
              <select id="translatorSubtitleStyle">
                <option value="boxed">Boxed</option>
                <option value="outline">Outline</option>
              </select>
              <input id="translatorVideoProvider" type="text" placeholder="LLM provider" />
              <button type="submit">Перевести видео</button>
            </div>
          </form>
        </section>
      </section>

      <section class="tool-grid">
        <aside class="side-panel">
          <h2>Статус</h2>
          <div id="translatorStatus" class="empty-inline">Ожидает запуска.</div>
          <div class="progress-track" aria-hidden="true">
            <div id="translatorProgress" class="progress-bar"></div>
          </div>
          <div id="translatorMetrics" class="metrics-grid"></div>
          <div id="translatorDownloads" class="reference-list compact"></div>
        </aside>
        <section class="editor-panel translator-result-panel">
          <div class="tab-list" role="tablist" aria-label="Результат перевода">
            <button class="tab-button active" type="button" data-tab-target="translatorOriginalTab" aria-selected="true">Оригинал</button>
            <button class="tab-button" type="button" data-tab-target="translatorResultTab" aria-selected="false">Перевод</button>
            <button class="tab-button" type="button" data-tab-target="translatorJobTab" aria-selected="false">Job</button>
          </div>
          <section id="translatorOriginalTab" class="tab-content active" role="tabpanel">
            <article id="translatorOriginal" class="markdown-preview"></article>
          </section>
          <section id="translatorResultTab" class="tab-content" role="tabpanel" hidden>
            <article id="translatorResult" class="markdown-preview"></article>
          </section>
          <section id="translatorJobTab" class="tab-content" role="tabpanel" hidden>
            <details class="generated-data-preview" open>
              <summary>Translation job payload</summary>
              <pre id="translatorJobPayload"></pre>
            </details>
          </section>
        </section>
      </section>
    </main>
    <script src="/static/shared/shell.js"></script>
    <script src="/static/shared/markdown.js"></script>
    <script src="/static/translator/panel.js"></script>
  </body>
</html>

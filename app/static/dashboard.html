<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Content Factory</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="dashboard-shell">
      <header class="dashboard-header">
        <p class="eyebrow">Content Factory</p>
        <h1>Рабочая панель</h1>
      </header>
      <section class="module-grid" aria-label="Модули">{{ module_tiles }}</section>
    </main>
    <script>
      document.addEventListener("click", (event) => {
        const tile = event.target.closest(".module-tile");
        if (!tile) return;
        if (tile.dataset.panel) window.location.href = `/static/${tile.dataset.panel}`;
      });
    </script>
  </body>
</html>

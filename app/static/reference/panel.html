<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Справочник · Content Factory</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="workbench reference-panel" data-module="reference">
      <header class="workbench-header">
        <a class="back-link" href="/">Content Factory</a>
        <h1>Справочник</h1>
        <div class="toolbar">
          <input id="searchInput" class="toolbar-input" placeholder="Компетенция, skill, индикатор" />
          <select id="reviewStatusFilter" aria-label="Статус review">
            <option value="open">open</option>
            <option value="all">all</option>
            <option value="resolved">resolved</option>
            <option value="ignored">ignored</option>
          </select>
          <label class="inline-check">
            <input id="includeServiceProfiles" type="checkbox" />
            service
          </label>
          <button id="searchButton" type="button">Искать</button>
        </div>
      </header>

      <section class="reference-grid">
        <aside class="side-panel">
          <div id="summaryCards" class="summary-grid" aria-label="Сводка справочника"></div>
          <div class="tab-list" role="tablist" aria-label="Разделы справочника">
            <button class="tab-button active" type="button" data-reference-mode="competencies">Компетенции</button>
            <button class="tab-button" type="button" data-reference-mode="profiles">Профили</button>
            <button class="tab-button" type="button" data-reference-mode="skills">Skills</button>
            <button class="tab-button" type="button" data-reference-mode="reviews">Review</button>
          </div>
          <div id="competencyList" class="reference-list" aria-label="Компетенции"></div>
          <div id="profileList" class="reference-list" aria-label="Профили" hidden></div>
          <div id="skillList" class="reference-list" aria-label="Skills" hidden></div>
          <div id="reviewList" class="reference-list" aria-label="Очередь проверки" hidden></div>
        </aside>

        <section class="editor-panel reference-detail" aria-live="polite">
          <section id="competencyDetailSection" class="reference-detail-section">
            <form id="competencyForm">
              <div class="form-row two">
                <label>
                  Название
                  <input id="competencyTitle" required />
                </label>
                <label>
                  Статус
                  <select id="competencyStatus">
                    <option value="active">active</option>
                    <option value="candidate">candidate</option>
                    <option value="deprecated">deprecated</option>
                  </select>
                </label>
              </div>
              <label>
                Описание
                <textarea id="competencyDescription" rows="4"></textarea>
              </label>
              <div class="form-actions">
                <button type="submit">Сохранить компетенцию</button>
              </div>
            </form>
            <div id="detailMeta" class="metrics"></div>
            <div id="skillTree" class="reference-tree"></div>
          </section>

          <section id="skillDetailSection" class="reference-detail-section" hidden>
            <form id="skillForm">
              <div class="form-row two">
                <label>
                  Canonical skill
                  <input id="skillCanonicalName" required />
                </label>
                <label>
                  Статус
                  <select id="skillStatus">
                    <option value="active">active</option>
                    <option value="candidate">candidate</option>
                    <option value="deprecated">deprecated</option>
                  </select>
                </label>
              </div>
              <label>
                Тип skill
                <input id="skillType" placeholder="unknown" />
              </label>
              <label>
                Алиасы
                <textarea id="skillAliases" rows="4" placeholder="Один alias на строку"></textarea>
              </label>
              <div class="form-actions">
                <button id="newSkillButton" class="btn" type="button">Новый skill</button>
                <button type="submit">Сохранить skill</button>
              </div>
            </form>
          </section>

          <section id="profileDetailSection" class="reference-detail-section" hidden>
            <div id="profileDetail" class="reference-tree"></div>
          </section>

          <div id="referenceStatus" class="status-line"></div>
        </section>
      </section>
    </main>
    <script src="/static/reference/panel.js"></script>
  </body>
</html>

action_prefixes:
  - pattern: '^锌褉芯械泻褌懈褉芯胁邪褌褜\s+(.+)$'
    noun: 袩褉芯械泻褌懈褉芯胁邪薪懈械
  - pattern: '^屑芯写械谢懈褉芯胁邪褌褜\s+(.+)$'
    noun: 袦芯写械谢懈褉芯胁邪薪懈械
  - pattern: '^锌懈褋邪褌褜\s+(.+)$'
    noun: 袧邪锌懈褋邪薪懈械
  - pattern: '^薪邪褋褌褉邪懈胁邪褌褜\s+(.+)$'
    noun: 袧邪褋褌褉芯泄泻邪
  - pattern: '^褉邪蟹褉邪斜芯褌邪褌褜\s+(.+)$'
    noun: 袪邪蟹褉邪斜芯褌泻邪
  - pattern: '^褉邪蟹褉邪斜邪褌褘胁邪褌褜\s+(.+)$'
    noun: 袪邪蟹褉邪斜芯褌泻邪
  - pattern: '^褌械褋褌懈褉芯胁邪褌褜\s+(.+)$'
    noun: 孝械褋褌懈褉芯胁邪薪懈械
  - pattern: '^褉邪斜芯褌邪褌褜\s+褋\s+(.+)$'
    noun: 袪邪斜芯褌邪 褋
  - pattern: '^芯斜褉邪斜邪褌褘胁邪褌褜\s+(.+)$'
    noun: 袨斜褉邪斜芯褌泻邪
  - pattern: '^写懈邪谐薪芯褋褌懈褉芯胁邪褌褜\s+(.+)$'
    noun: 袛懈邪谐薪芯褋褌懈泻邪

bloom_signals:
  create: '\b(褋芯蟹写邪|褉邪蟹褉邪斜芯褌(泻|邪|褘胁邪|邪褌褜|邪械褌|邪褞褌|邪谢|邪谢懈|邪薪)|褋锌褉芯械泻褌|锌芯褋褌褉芯|褋芯斜懈褉|泻芯薪褌械泄薪械褉懈蟹)'
  analyze: '\b(邪薪邪谢懈蟹|芯褑械薪懈|褋褉邪胁薪懈胁|胁褘斜懈褉邪|锌褉芯械泻褌懈褉|屑芯写械谢懈褉|写懈邪谐薪芯褋褌)'
  apply: '\b(锌褉懈屑械薪|懈褋锌芯谢褜蟹|薪邪褋褌褉芯|薪邪褋褌褉邪|褌械褋褌懈褉|锌懈褋邪|芯斜褉邪斜芯褌|写械锌谢芯|褉邪蟹胁械褉褌|褉邪蟹胁褢褉褌|谢芯谐懈褉芯胁邪薪|屑芯薪懈褌芯褉懈薪谐|懈薪褌械谐褉懈褉)'

context_prefix: '^(?:胁褘锌褍褋泻薪懈泻\s+写芯谢卸械薪|褍褔邪褋褌薪懈泻\s+写芯谢卸械薪|薪褍卸薪芯\s+褍屑械褌褜|褋褌褍写械薪褌\s+写芯谢卸械薪)\s+'
program_frame:
  schedule_pattern: '\b(薪械写械谢褜|褔邪褋芯胁?\s+(?:胁|/)\s+薪械写械谢)\b'
  context_pattern: '\b(锌褉芯谐褉邪屑屑邪|泻褍褉褋|芯斜褍褔械薪懈|褍褔械斜薪|褉邪斜芯褌邪\s+褋\s+褌械屑芯泄)\b'

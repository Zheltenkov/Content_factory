# Line budgets used by migration/CI gates. Vendor bundles and binary assets are
# excluded from source budgets; they are dependency/assets decisions, not ported code.
packages:
  generator:
    paths:
      - app/modules/generator/**/*.py
    max_lines: 10000
  translator:
    paths:
      - app/modules/translator/**/*.py
    max_lines: 2500
  checker:
    paths:
      - app/modules/checker/**/*.py
    max_lines: 3600
    budget_override: true
    previous_max_lines: 3000
    reason: >
      The auditor carries two full axes (structural registry + didactic jury and
      debate), plus improvement and reverse-extraction. 3000 was sized before the
      didactic debate/report and reverse-extraction surfaces landed. Revisit if the
      module grows further without new capability.
  curriculum:
    paths:
      - app/modules/curriculum/**/*.py
    max_lines: 6000
  reference:
    paths:
      - app/modules/reference/**/*.py
    max_lines: 1500
  static_ui:
    paths:
      - app/static/**/*.html
      - app/static/**/*.js
      - app/static/**/*.css
    max_lines: 12000
    budget_override: true
    previous_max_lines: 5000
    reason: >
      W6 UI parity needs five live panels and a shared design system. Legacy ver1
      frontend is already modular and is about 24k lines without minified vendor
      and binary assets, so 5k incentivizes skeletal panels instead of a usable UI.
    excludes:
      - legacy/Content_generator/static/vendor/**/*.min.js
      - legacy/Content_generator/static/land.png
